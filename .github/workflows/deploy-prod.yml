name: Build and deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  create-deploy-artifacts:
    name: Create Deployment artifacts;

    runs-on: ubuntu-latest

    outputs:
      deployment-matrix: ${{ steps.export-deployment-matrix.outputs.deployment-matrix }}

    steps:
      - uses: actions/checkout@v2

      # - name: Compile CSS and Javascript

      #   run: |
      #     npm update
      #     npm install
      #     npm run build

      - name: Configure PHP 8.3

        uses: shivammathur/setup-php@v2

        with:
          php-version: 8.3

          extensions: mbstring, ctype, fileinfo, openssl, PDO, bcmath, json, tokenizer, xml, curl, pdo_mysql, zip, gd

      - name: Create database
        run: touch ./database/database.sqlite

      - name: Copy .env
        run: cp .env.example .env

      - name: Install Composer dependencies

        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Dump Composer dependencies

        run: composer dump-autoload

      - name: Create deployment artifacts

        env:
          GITHUB_SHA: ${{github.sha}}

        run: tar -czf "${GITHUB_SHA}".tar.gz --exclude=*.git --exclude=node_modules *

      - name: Store artifact for distribution

        uses: actions/upload-artifact@v4

        with:
          name: app-build

          path: ${{github.sha}}.tar.gz

      - name: Export deployment matrix
        id: export-deployment-matrix
        run: |
          delimiter="$(openssl rand -hex 8)"
          JSON="$(cat ./.github/workflows/deployment-config.json)"
          echo "deployment-matrix<<${delimiter}" >> "${GITHUB_OUTPUT}"
          echo "$JSON" >> "${GITHUB_OUTPUT}"
          echo "${delimiter}" >> "${GITHUB_OUTPUT}"

  prepare-release-on-server:
    runs-on: ubuntu-latest

    needs: create-deploy-artifacts

    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deploy-artifacts.outputs.deployment-matrix) }}

    steps:
      - name: Create directories

        uses: appleboy/ssh-action@master

        with:
          host: ${{ matrix.server.ip }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSHKEY }}

          port: ${{ matrix.server.port }}

          script: |
            echo ${{ secrets.USERPWD }} | sudo -S mkdir -p "${{ matrix.server.path }}/artifacts"
            echo ${{ secrets.USERPWD }} | sudo -S chmod -R 0777 "${{ matrix.server.path }}/artifacts"

      - uses: actions/download-artifact@v4

        with:
          name: app-build

      - name: Upload Artifact to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ matrix.server.ip }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSHKEY }}

          port: ${{ matrix.server.port }}

          source: ${{github.sha}}.tar.gz

          target: ${{ matrix.server.path }}/artifacts

      - name: Extract archive and create directories

        uses: appleboy/ssh-action@master

        env:
          GITHUB_SHA: ${{ github.sha }}

        with:
          host: ${{ matrix.server.ip }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSHKEY }}

          port: ${{ matrix.server.port }}

          envs: GITHUB_SHA

          script: |
            echo ${{ secrets.USERPWD }} | sudo -S mkdir -p "${{ matrix.server.path }}/releases/${GITHUB_SHA}"

            echo ${{ secrets.USERPWD }} | sudo -S tar xzf ${{ matrix.server.path }}/artifacts/${GITHUB_SHA}.tar.gz -C "${{ matrix.server.path }}/releases/${GITHUB_SHA}"

            echo ${{ secrets.USERPWD }} | sudo -S rm -rf ${{ matrix.server.path }}/releases/${GITHUB_SHA}/storage

            echo ${{ secrets.USERPWD }} | sudo -S mkdir -p ${{ matrix.server.path }}/storage/{app,public,framework,logs}

            echo ${{ secrets.USERPWD }} | sudo -S mkdir -p ${{ matrix.server.path }}/storage/framework/{cache,sessions,testing,views}

            echo ${{ secrets.USERPWD }} | sudo -S mkdir -p ${{ matrix.server.path }}/storage/framework/cache/data

            echo ${{ secrets.USERPWD }} | sudo -S chown -R ${{secrets.USERNAME}}:${{secrets.USERNAME}} ${{ matrix.server.path }}/storage

            echo ${{ secrets.USERPWD }} | sudo -S chmod -R ug+rwx ${{ matrix.server.path }}/storage

  run-before-hooks:
    name: "${{ matrix.server.name }}: Before hook"

    runs-on: ubuntu-latest

    needs: [create-deploy-artifacts, prepare-release-on-server]

    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deploy-artifacts.outputs.deployment-matrix) }}
    steps:
      - name: Run before hooks

        uses: appleboy/ssh-action@master

        env:
          GITHUB_SHA: ${{ github.sha }}

          RELEASE_PATH: ${{ matrix.server.path }}/releases/${{ github.sha }}

          ACTIVE_RELEASE_PATH: ${{ matrix.server.path }}/current

          STORAGE_PATH: ${{ matrix.server.path }}/storage

          BASE_PATH: ${{ matrix.server.path }}

        with:
          host: ${{ matrix.server.ip }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSHKEY }}

          port: ${{ matrix.server.port }}

          envs: GITHUB_SHA,RELEASE_PATH,ACTIVE_RELEASE_PATH,STORAGE_PATH,BASE_PATH

          script: |
            ${{ matrix.server.beforeHooks }}

  activate-release:
    name: "${{ matrix.server.name }}: Activate release"

    runs-on: ubuntu-latest

    needs:
      [create-deploy-artifacts, prepare-release-on-server, run-before-hooks]

    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deploy-artifacts.outputs.deployment-matrix) }}

    steps:
      - name: Activate release

        uses: appleboy/ssh-action@master

        env:
          GITHUB_SHA: ${{ github.sha }}

          RELEASE_PATH: ${{ matrix.server.path }}/releases/${{ github.sha }}

          ACTIVE_RELEASE_PATH: ${{ matrix.server.path }}/current

          STORAGE_PATH: ${{ matrix.server.path }}/storage

          BASE_PATH: ${{ matrix.server.path }}

          LARAVEL_ENV: ${{ secrets.LARAVEL_ENV }}

        with:
          host: ${{ matrix.server.ip }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSHKEY }}

          port: ${{ matrix.server.port }}

          envs: GITHUB_SHA,RELEASE_PATH,ACTIVE_RELEASE_PATH,STORAGE_PATH,BASE_PATH,ENV_PATH,LARAVEL_ENV

          script: |

            echo ${{ secrets.USERPWD }} | sudo -S chown -R ${{secrets.USERNAME}}:${{secrets.USERNAME}} ${RELEASE_PATH}

            echo ${{ secrets.USERPWD }} | sudo -S chmod -R 755 ${RELEASE_PATH}

            echo ${{ secrets.USERPWD }} | sudo -S chown -R ${{secrets.USERNAME}}:${{secrets.USERNAME}} ${BASE_PATH}

            echo ${{ secrets.USERPWD }} | sudo -S chmod -R u+w ${BASE_PATH}

            printf "%s" "$LARAVEL_ENV" > "${BASE_PATH}/.env"

            ln -s -f ${BASE_PATH}/.env $RELEASE_PATH

            ln -s -f $STORAGE_PATH $RELEASE_PATH

            echo ${{ secrets.USERPWD }} | sudo -S rsync -a --progress $RELEASE_PATH/ $ACTIVE_RELEASE_PATH/

            echo ${{ secrets.USERPWD }} | sudo -S chmod -R 0777 $ACTIVE_RELEASE_PATH/storage

            echo ${{ secrets.USERPWD }} | sudo -S chmod -R 0777 $ACTIVE_RELEASE_PATH/bootstrap/cache

            cd $ACTIVE_RELEASE_PATH && composer install && php artisan down && php artisan migrate --force && php artisan db:seed && php artisan up

            echo ${{ secrets.USERPWD }} | sudo -S systemctl reload nginx

  run-after-hooks:
    name: "${{ matrix.server.name }}: After hook"

    runs-on: ubuntu-latest

    needs:
      [
        create-deploy-artifacts,
        prepare-release-on-server,
        run-before-hooks,
        activate-release,
      ]
    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deploy-artifacts.outputs.deployment-matrix) }}
    steps:
      - name: Run after hooks
        uses: appleboy/ssh-action@master
        env:
          GITHUB_SHA: ${{ github.sha }}

          RELEASE_PATH: ${{ matrix.server.path }}/releases/${{ github.sha }}

          ACTIVE_RELEASE_PATH: ${{ matrix.server.path }}/current

          STORAGE_PATH: ${{ matrix.server.path }}/storage

          BASE_PATH: ${{ matrix.server.path }}
        with:
          host: ${{ matrix.server.ip }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSHKEY }}

          port: ${{ matrix.server.port }}

          envs: GITHUB_SHA,RELEASE_PATH,ACTIVE_RELEASE_PATH,STORAGE_PATH,BASE_PATH
          script: |
            ${{ matrix.server.afterHooks }}

  clean-up:
    name: "${{ matrix.server.name }}: Clean up"

    runs-on: ubuntu-latest

    needs:
      [
        create-deploy-artifacts,
        prepare-release-on-server,
        run-before-hooks,
        activate-release,
        run-after-hooks,
      ]
    strategy:
      matrix:
        server: ${{ fromJson(needs.create-deploy-artifacts.outputs.deployment-matrix) }}
    steps:
      - name: Run after hooks
        uses: appleboy/ssh-action@master
        env:
          RELEASES_PATH: ${{ matrix.server.path }}/releases

          ARTIFACTS_PATH: ${{ matrix.server.path }}/artifacts
        with:
          host: ${{ matrix.server.ip }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSHKEY }}

          port: ${{ matrix.server.port }}

          envs: RELEASES_PATH,ARTIFACTS_PATH
          script: |
            cd $RELEASES_PATH && ls -t -1 | tail -n +4 | xargs rm -rf

            cd $ARTIFACTS_PATH && ls -t -1 | tail -n +4 | xargs rm -rf
