name: Build and test

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: shivammathur/setup-php@15c43e89cdef867065b0213be354c2841860869e
        with:
          php-version: "8.3"

          extensions: mbstring, ctype, fileinfo, openssl, PDO, bcmath, json, tokenizer, xml, curl, pdo_mysql, zip

      - uses: actions/checkout@v4
      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      # - name: Copy .env
      #   run: cp .env.testing .env

      # - name: Set DEV DB Configs
      #   run: |
      #     echo "DB_HOST=${{ secrets.DEV_DB_HOST }}" >> .env
      #     echo "DB_USER=${{ secrets.DEV_DB_USER }}" >> .env
      #     echo "DB_PORT=${{ secrets.DEV_DB_PORT }}" >> .env
      #     echo "DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }}" >> .env
      #     echo "DB_NAME=${{ secrets.DEV_DB_NAME }}" >> .env

      #   shell: bash

      - name: Install Dependencies
        run: composer install

      - name: Dump autoload files
        run: composer dump-autoload -o

      - name: Generate key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate

      - name: Execute tests (Unit and Feature tests) via PHPUnit/Pest
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

        run: php artisan test
